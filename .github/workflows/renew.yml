name: JustRunMy 自动续期 (全自动随机顺序版)
on:
  workflow_dispatch:
  schedule:
    # 每天凌晨 02:30 触发
    - cron: '30 2 * * *' 

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          # 自动检索所有 EML_ 开头的 Secrets 并生成任务序列
          COUNT=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | sort -n | jq -R . | jq -s -c .)
          echo "matrix=$COUNT" >> $GITHUB_OUTPUT

  renew:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      # 【核心优化】max-parallel: 1 确保账号之间顺序执行，不重叠
      max-parallel: 1
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛠️ 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🎲 随机延迟 (防风控模拟)
        # 仅在定时触发时随机挂机，手动触发时立即执行
        if: github.event_name == 'schedule'
        run: |
          # 随机休眠 0 到 15 小时 (54000秒)
          # 结合顺序执行，账号 A 和 B 的实际执行时间将被彻底打乱
          RANDOM_DELAY=$(( RANDOM % 54000 ))
          echo "为了模拟真实访问，账号 ${{ matrix.account_index }} 随机延迟 $RANDOM_DELAY 秒后启动..."
          sleep $RANDOM_DELAY

      - name: 🚀 运行原版脚本
        env:
          # 动态映射 Secrets 到脚本环境变量
          JUSTRUNMY_EMAIL: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
          JUSTRUNMY_PASSWORD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
          TG_BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py

      - name: 📸 上传错误截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-acc-${{ matrix.account_index }}
          path: "*.png"
